<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="version" content="gater.vss.0.2">
    <link rel="icon" type="image/png" href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABAAAAAQAQMAAAAlPW0iAAAABlBMVEUAAAD///+l2
        Z/dAAAAGElEQVQIW2NgAAO7GjDigSKoIIwLkQUDAG+qBKVbIwGvAAAAAElFTkSuQmCC">
    <title>gater</title>
    <style>
        body {
            background-color: #555;
            margin: 0px;
            overflow: hidden;
        }

        #uigrid {
            height: calc(100vh - 0px);
            width: calc(100vw - 0px);
            /* background-color: #364; */
            display: grid;
            grid-template-areas:
                "lft top rht"
                "lft mid rht"
                "lft bot rht";
            grid-template-rows: min-content 1fr min-content;
            grid-template-columns: min-content 1fr min-content;
        }

        #workspace {
            grid-area: mid;
            /* height: calc(100vh - 10px); */
            /* background-color: #550; */
            margin: 0;
            overflow: hidden;
        }

        #topbar {
            grid-area: top;
            margin: 0;
            padding: 5px;
        }

        #maincanvas {
            position: absolute;
            left: 0;
            top: 0;
            z-index: -1;

            image-rendering: pixelated;
            image-rendering: crisp-edges;
            background-color: #000;
            transform-origin: 0 0;
            transform: matrix(1, 0, 0, 1, 0, 0);
        }

        #leftbar {
            grid-area: lft;
            display: flex;
            min-width: 20px;
            padding-block: 2px;
            gap: 2px;
        }


        #rightbar {
            grid-area: rht;
            display: flex;
            min-width: 20px;
            padding-block: 2px;
            gap: 2px;
        }

        #bottombar {
            grid-area: bot;
            display: flex;
            height: 28px;
            padding-block: 2px;
            /* padding-top: 1px; */
            gap: 2px;
            /* padding-bottom: 1px; */
            font-size: 24px;
            font-family: monospace;
        }
    </style>
</head>

<body>
    <div id="uigrid">
        <header id="topbar" style="background-color: darkorange;">
            <h1>gater</h1>
        </header>
        <div id="workspace">
            <canvas id="maincanvas"></canvas>
        </div>
        <div id="leftbar" style="background-color: darkred;"></div>
        <div id="rightbar" style="background-color: darkgreen;"></div>
        <div id="bottombar" style="background-color: darkblue;"></div>
    </div>
    <img id="testpattern" style="display: none;" 
        src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAQAAAAEABAMAAACuXLVVAAAAAXNSR0IArs4c6QAAAARnQU1BAACxjwv8YQUAAAAGUExURQAA
        AP///6XZn90AAAAJcEhZcwAADsIAAA7CARUoSoAAAAFTSURBVHja7d3dioMwEIDR+AbN+7/sblsQ0f4ESZ0JOd9FEZHMYWtt2ZuU8JZabyWox+yllDjAffay3OI
        A99nxgPC3IPomVI7qo8B58YD15ZoO8xIA/v8glwJ28wASAMrsn4Lpn4SS1uqmkHUBEgCOR30AjesCpAA8b5T+gKZ1AQAAUgD2R70ATesCJAD4RTQ7QJKkY/VNZ6
        8DAAAYE9DzHAAAwLiA7YPl07Bv1wEAAAAAAACMC+h1DgAAYEzAq85eBwAAMB5AkiRJkiTJf0gAAADeDTt7DgAAYFzA9sHyadi36wAAAAAAAADGBfQ6BwAAMCbgV
        WevAwAAGA8gSZqtX32NNK8LkABwPOoDaFwXIAXgeaP0BzStCwAAkAKwP+oFaFoXIAHAL6LZAdK0Xf35OMyLB6wv13SYlwBQbS9of8Nif8O5n4SKzL7n9j2373ls
        pfwB9tEPAH6fwbsAAAAASUVORK5CYII=">

    <script>
        // @ts-check
        const show = (function makeShow() {
            const canvas = /**@type {HTMLCanvasElement}*/(document.getElementById("maincanvas"));
            const context = /**@type {CanvasRenderingContext2D}*/(canvas.getContext("2d", { alpha: false }));
            return { context };
        })();
        var workspace = assertElement("workspace", HTMLDivElement);
        var main = assertElement("maincanvas", HTMLCanvasElement);
        var test = assertElement("testpattern", HTMLImageElement);
        var ctxt = assertContext(main, "2d");
        main.width = test.width;
        main.height = test.height;
        ctxt.drawImage(test, 0, 0);
        window.onresize = () => {
            const scale = 7;
            main.style.left = `${50 / devicePixelRatio}px`;
            main.style.top = `${150 / devicePixelRatio}px`;
            main.style.width = `${main.width * scale / devicePixelRatio}px`;
            main.style.height = `${main.height * scale / devicePixelRatio}px`;
        };
        window.dispatchEvent(new Event("resize"));

        /**@overload @param {string} id @param {typeof HTMLImageElement}  constructor @returns {HTMLImageElement}*/
        /**@overload @param {string} id @param {typeof HTMLDivElement}    constructor @returns {HTMLDivElement}*/
        /**@overload @param {string} id @param {typeof HTMLCanvasElement} constructor @returns {HTMLCanvasElement}*/
        function assertElement(id, constructor) {
            const el = document.getElementById(id);
            if (!(el instanceof constructor)) { throw new TypeError(`Element "${id}" is not a ${constructor.name}`); }
            return el;
        }
        function assertContext(canvas, contextType) {
            const ctx = canvas.getContext(contextType);
            if (!(ctx instanceof CanvasRenderingContext2D)) { throw new TypeError(`Could not get 2d context`); }
            return ctx;
        }

    </script>
</body>

</html>
