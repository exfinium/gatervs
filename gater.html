<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="version" content="gater.vss.0.7.1">
    <meta name="version-notes" content="Implemented IndexedDB support. Added orch module to coordinate other modules.">
    <link rel="icon" type="image/png" href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABAAAAAQAQMAAAAlPW0iAAAABlBMVEUAAAD///+l2
        Z/dAAAAGElEQVQIW2NgAAO7GjDigSKoIIwLkQUDAG+qBKVbIwGvAAAAAElFTkSuQmCC">
    <title>gater</title>
    <style>
        body {
            background-color: #555;
            margin: 0px;
            overflow: hidden;
        }

        #uigrid {
            height: calc(100vh - 0px);
            width: calc(100vw - 0px);
            display: grid;
            grid-template-areas:
                "lft top rht"
                "lft mid rht"
                "lft bot rht";
            grid-template-rows: min-content 1fr min-content;
            grid-template-columns: min-content 1fr min-content;
        }

        #workspace {
            grid-area: mid;
            margin: 0;
            overflow: hidden;
        }

        #topbar {
            grid-area: top;
            margin: 0;
            padding: 5px;
            height: 50px;
        }

        #maincanvas {
            position: fixed;
            left: 0;
            top: 0;
            z-index: -1;
            image-rendering: pixelated;
            background-color: #000;
        }

        #leftbar {
            grid-area: lft;
            display: flex;
            min-width: 20px;
            padding-block: 2px;
            gap: 2px;
        }


        #rightbar {
            grid-area: rht;
            display: flex;
            min-width: 20px;
            padding-block: 2px;
            gap: 2px;
        }

        #bottombar {
            grid-area: bot;
            display: flex;
            height: 28px;
            padding-block: 2px;
            gap: 2px;
            font-size: 24px;
            font-family: monospace;
        }
    </style>
</head>

<body>
    <div id="uigrid">
        <header id="topbar" style="background-color: darkorange;">
            <h1>gater</h1>
        </header>
        <div id="workspace">
            <canvas id="maincanvas"></canvas>
        </div>
        <div id="leftbar" style="background-color: darkred;"></div>
        <div id="rightbar" style="background-color: darkgreen;"></div>
        <div id="bottombar" style="background-color: darkblue;"></div>
    </div>
    <img id="testpattern" style="display: none;" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAQAAAAEABAMAAACuXLVVAAAAAXNSR0I
        Ars4c6QAAAARnQU1BAACxjwv8YQUAAAAGUExURQAAAP///6XZn90AAAAJcEhZcwAADsIAAA7CARUoSoAAAAFTSURBVHja7d3dioMwEIDR+AbN+7/sblsQ0f4ESZ
        0JOd9FEZHMYWtt2ZuU8JZabyWox+yllDjAffay3OIA99nxgPC3IPomVI7qo8B58YD15ZoO8xIA/v8glwJ28wASAMrsn4Lpn4SS1uqmkHUBEgCOR30AjesCpAA8b
        5T+gKZ1AQAAUgD2R70ATesCJAD4RTQ7QJKkY/VNZ68DAAAYE9DzHAAAwLiA7YPl07Bv1wEAAAAAAACMC+h1DgAAYEzAq85eBwAAMB5AkiRJkiTJf0gAAADeDTt7
        DgAAYFzA9sHyadi36wAAAAAAAADGBfQ6BwAAMCbgVWevAwAAGA8gSZqtX32NNK8LkABwPOoDaFwXIAXgeaP0BzStCwAAkAKwP+oFaFoXIAHAL6LZAdK0Xf35OMy
        LB6wv13SYlwBQbS9of8Nif8O5n4SKzL7n9j2373lspfwB9tEPAH6fwbsAAAAASUVORK5CYII=">

    <script>
        // @ts-check
        const show = (function Show() {
            const canvas = /**@type {HTMLCanvasElement}*/(document.getElementById("maincanvas"));
            const context = /**@type {CanvasRenderingContext2D}*/(canvas.getContext("2d", { alpha: false }));
            const workspace = /**@type {HTMLElement}*/(canvas.parentElement);
            let pointer = { ev: new PointerEvent('pointermove'), canvasX: 0, canvasY: 0, canvasHit: false, canvasIndex: 0 };
            let canvasScale = 1, canvasLeft = 0, canvasTop = 0;
            let canvasImageData = context.getImageData(0, 0, canvas.width, canvas.height);
            let dpr = devicePixelRatio;
            const frameTasks = (function makeFrameTasks() {
                const tasks = new Set();
                function run(frameTime) {
                    for (const task of tasks) {
                        task(frameTime);
                    }
                    requestAnimationFrame(run);
                }
                requestAnimationFrame(run);
                return {
                    add: function addTask(task) {
                        tasks.add(task);
                    },
                    delete: function deleteTask(task) {
                        tasks.delete(task);
                    },
                    clear: function clearTasks() {
                        tasks.clear();
                    }
                };
            })();
            function pointerSave(/** @type {PointerEvent} */ e) {
                const rect = canvas.getBoundingClientRect();
                pointer.canvasX = Math.floor((e.clientX - rect.left) * (canvas.width / rect.width));
                pointer.canvasY = Math.floor((e.clientY - rect.top) * (canvas.height / rect.height));
                pointer.canvasHit = pointer.canvasX >= 0 && pointer.canvasX < canvas.width
                    && pointer.canvasY >= 0 && pointer.canvasY < canvas.height;
                pointer.canvasIndex = pointer.canvasHit ? (pointer.canvasY * canvas.width + pointer.canvasX) : -1;
            }
            function mousePan(/** @type {PointerEvent} */ e) {
                if (e.type === "pointermove" && e.buttons === 4) {
                    const newLeft = canvasLeft + e.movementX * 4 / dpr;
                    const newTop = canvasTop + e.movementY * 4 / dpr;
                    posit(newLeft, newTop);
                }
            }
            function mouseZoom(/** @type {WheelEvent} */ e) {
                if (!e.ctrlKey) {
                    e.preventDefault();
                    if (e.deltaY === 0) return;
                    const z = e.shiftKey ? 1.2 : 2;
                    const zoomFactor = e.deltaY < 0 ? z : 1 / z;
                    const newScale = canvasScale * zoomFactor;
                    if (newScale < 0.02 || newScale > 2000) return; // clamp zoom level
                    const newLeft = e.clientX - (e.clientX - canvasLeft) * zoomFactor;
                    const newTop = e.clientY - (e.clientY - canvasTop) * zoomFactor;
                    const newWidth = (canvas.width * canvasScale / dpr) * zoomFactor;
                    const newHeight = (canvas.height * canvasScale / dpr) * zoomFactor;
                    posit(newLeft, newTop, newScale);
                }
            }
            function load(/** @type {ImageData} */ src) {
                canvas.width = src.width;
                canvas.height = src.height;
                put(src);
                canvasScale = 1;
                centerCanvasOnWorkspace();
            }
            function centerCanvasOnWorkspace() {
                const rect = workspace.getBoundingClientRect();
                const width = (canvas.width * canvasScale) / dpr;
                const height = (canvas.height * canvasScale) / dpr;
                const newLeft = rect.left + (rect.width - width) / 2;
                const newTop = rect.top + (rect.height - height) / 2;
                posit(newLeft, newTop, canvasScale);
            }
            function posit(left = canvasLeft, top = canvasTop, scale = canvasScale) {
                if (dpr !== devicePixelRatio) {
                    left = left * (dpr / devicePixelRatio);
                    top = top * (dpr / devicePixelRatio);
                    dpr = devicePixelRatio;
                }
                const right = left + (canvas.width * scale / dpr);
                const bottom = top + (canvas.height * scale / dpr);
                const canvasRight = canvasLeft + (canvas.width * canvasScale / dpr);
                const canvasBottom = canvasTop + (canvas.height * canvasScale / dpr);
                if (!(left > canvasLeft && canvasLeft > innerWidth
                    || right < canvasRight && canvasRight < 0
                    || top > canvasTop && canvasTop > innerHeight
                    || bottom < canvasBottom && canvasBottom < 0
                )) {
                    canvasLeft = left;
                    canvasTop = top;
                    canvasScale = scale;
                    frameTasks.add(updatePosition);
                }
                function roundToDevicePixel(value) {
                    return Math.round(value * dpr) / dpr;
                }
                function updatePosition() {
                    frameTasks.delete(updatePosition);
                    canvas.style.width = `${canvas.width * canvasScale / dpr}px`;
                    canvas.style.height = `${canvas.height * canvasScale / dpr}px`;
                    canvas.style.left = `${roundToDevicePixel(canvasLeft)}px`;
                    canvas.style.top = `${roundToDevicePixel(canvasTop)}px`;
                }
            }
            function put(/** @type {ImageData|null} */ pixelData = null) {
                if (pixelData) {
                    canvasImageData = pixelData;
                }
                frameTasks.add(updatePixels);
                function updatePixels() {
                    frameTasks.delete(updatePixels);
                    context.putImageData(canvasImageData, 0, 0);
                }
            }
            function getImageData() {
                return canvasImageData;
            }
            workspace.addEventListener("wheel", mouseZoom, { passive: false });
            workspace.addEventListener("pointermove", (ev) => { pointerSave(ev); mousePan(ev); });
            window.addEventListener("resize", () => posit());
            return { load, put, pointer, getImageData };
        })();

        const file = (function File() {
            let /**@type {IDBDatabase}*/db
            (function DB() {
                const request = indexedDB.open("gaterdb", 1);
                let upgrading = false;
                request.onerror = ev => console.error("Error opening IndexedDB:", ev);
                request.onupgradeneeded = ev => {
                    console.warn("Local IndexedDB not found. Creating local persistent data store.", ev);
                    upgrading = true
                    request.result.createObjectStore("persistImd");
                };
                request.onsuccess = ev => {
                    db = request.result;
                    if (upgrading) {
                        console.info("Database upgrade complete. Loading default art.", ev);
                        const imd = loadTestPattern();
                        dbSetPersistImd1(imd);
                        orch.load(imd);
                    } else {
                        console.info("Database opened successfully. Loading saved art", db);
                        dbGetPersistImd1().onsuccess = ev => {
                            const imd = /**@type {ImageData}*/(/**@type {IDBRequest}*/(ev.target).result);
                            if (imd instanceof ImageData) {
                                orch.load(imd);
                            } else {
                                console.error("No image data found in database. Possible corruption.", ev);
                            }
                        };
                    }
                };
            })();
            function dbGet(storeName, key) {
                const request = db.transaction(storeName, 'readonly').objectStore(storeName).get(key);
                request.onerror = e => console.error(`Error getting key ${key} from store ${storeName}:`, request.error);
                return request;
            }
            function dbPut(storeName, key, value) {
                const request = db.transaction(storeName, 'readwrite').objectStore(storeName).put(value, key);
                request.onerror = () => console.error(`Error putting key ${key} into store ${storeName}:`, request.error);
                return request;
            }
            function dbGetPersistImd1() {
                return /**@type {IDBRequest<ImageData>}*/(dbGet('persistImd', 1));
            }
            function dbSetPersistImd1(imd) {
                return dbPut('persistImd', 1, imd);
            }

            function loadTestPattern() {
                const testPattern = /**@type {HTMLImageElement}*/(document.getElementById("testpattern"));
                const bgContext = /**@type {CanvasRenderingContext2D}*/(document.createElement("canvas").getContext("2d"));
                bgContext.canvas.width = testPattern.naturalWidth;
                bgContext.canvas.height = testPattern.naturalHeight;
                bgContext.drawImage(testPattern, 0, 0);
                const imd = bgContext.getImageData(0, 0, bgContext.canvas.width, bgContext.canvas.height);
                return imd;
            }
            return {};
        })();

        const orch = (function Orch() {
            // file module will call load() with initial image data once it's ready
            function load(/**@type {ImageData} */ imd) {
                show.load(imd);
            }
            return { load };
        })();

    </script>
</body>

</html>
