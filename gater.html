<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="version" content="gater.vss.0.5.0">
    <meta name="version-notes" content="Added file module.">
    <link rel="icon" type="image/png" href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABAAAAAQAQMAAAAlPW0iAAAABlBMVEUAAAD///+l2
        Z/dAAAAGElEQVQIW2NgAAO7GjDigSKoIIwLkQUDAG+qBKVbIwGvAAAAAElFTkSuQmCC">
    <title>gater</title>
    <style>
        body {
            background-color: #555;
            margin: 0px;
            overflow: hidden;
        }

        #uigrid {
            height: calc(100vh - 0px);
            width: calc(100vw - 0px);
            display: grid;
            grid-template-areas:
                "lft top rht"
                "lft mid rht"
                "lft bot rht";
            grid-template-rows: min-content 1fr min-content;
            grid-template-columns: min-content 1fr min-content;
        }

        #workspace {
            grid-area: mid;
            margin: 0;
            overflow: hidden;
        }

        #topbar {
            grid-area: top;
            margin: 0;
            padding: 5px;
            height: 50px;
        }

        #maincanvas {
            position: fixed;
            left: 0;
            top: 0;
            z-index: -1;
            image-rendering: pixelated;
            background-color: #000;
        }

        #leftbar {
            grid-area: lft;
            display: flex;
            min-width: 20px;
            padding-block: 2px;
            gap: 2px;
        }


        #rightbar {
            grid-area: rht;
            display: flex;
            min-width: 20px;
            padding-block: 2px;
            gap: 2px;
        }

        #bottombar {
            grid-area: bot;
            display: flex;
            height: 28px;
            padding-block: 2px;
            gap: 2px;
            font-size: 24px;
            font-family: monospace;
        }
    </style>
</head>

<body>
    <div id="uigrid">
        <header id="topbar" style="background-color: darkorange;">
            <h1>gater</h1>
        </header>
        <div id="workspace">
            <canvas id="maincanvas"></canvas>
        </div>
        <div id="leftbar" style="background-color: darkred;"></div>
        <div id="rightbar" style="background-color: darkgreen;"></div>
        <div id="bottombar" style="background-color: darkblue;"></div>
    </div>
    <img id="testpattern" style="display: none;" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAQAAAAEABAMAAACuXLVVAAAAAXNSR0I
        Ars4c6QAAAARnQU1BAACxjwv8YQUAAAAGUExURQAAAP///6XZn90AAAAJcEhZcwAADsIAAA7CARUoSoAAAAFTSURBVHja7d3dioMwEIDR+AbN+7/sblsQ0f4ESZ
        0JOd9FEZHMYWtt2ZuU8JZabyWox+yllDjAffay3OIA99nxgPC3IPomVI7qo8B58YD15ZoO8xIA/v8glwJ28wASAMrsn4Lpn4SS1uqmkHUBEgCOR30AjesCpAA8b
        5T+gKZ1AQAAUgD2R70ATesCJAD4RTQ7QJKkY/VNZ68DAAAYE9DzHAAAwLiA7YPl07Bv1wEAAAAAAACMC+h1DgAAYEzAq85eBwAAMB5AkiRJkiTJf0gAAADeDTt7
        DgAAYFzA9sHyadi36wAAAAAAAADGBfQ6BwAAMCbgVWevAwAAGA8gSZqtX32NNK8LkABwPOoDaFwXIAXgeaP0BzStCwAAkAKwP+oFaFoXIAHAL6LZAdK0Xf35OMy
        LB6wv13SYlwBQbS9of8Nif8O5n4SKzL7n9j2373lspfwB9tEPAH6fwbsAAAAASUVORK5CYII=">

    <script>
        // @ts-check
        const show = (function makeShow() {
            const canvas = /**@type {HTMLCanvasElement}*/(document.getElementById("maincanvas"));
            const context = /**@type {CanvasRenderingContext2D}*/(canvas.getContext("2d", { alpha: false }));
            const workspace = /**@type {HTMLElement}*/(canvas.parentElement);
            let pointer = { ev: new PointerEvent('pointermove'), canvasX: 0, canvasY: 0, canvasHit: false, canvasIndex: 0 };
            let canvasScale = 1, canvasLeft = 0, canvasTop = 0;
            let canvasImageData = context.getImageData(0, 0, canvas.width, canvas.height);
            let dpr = devicePixelRatio;
            const frameTasks = (function makeFrameTasks() {
                const tasks = new Set();
                function run(frameTime) {
                    for (const task of tasks) {
                        task(frameTime);
                    }
                    requestAnimationFrame(run);
                }
                requestAnimationFrame(run);
                return {
                    add: function addTask(task) {
                        tasks.add(task);
                    },
                    delete: function deleteTask(task) {
                        tasks.delete(task);
                    },
                    clear: function clearTasks() {
                        tasks.clear();
                    }
                };
            })();
            function pointerSave(/** @type {PointerEvent} */ e) {
                const rect = canvas.getBoundingClientRect();
                pointer.canvasX = Math.floor((e.clientX - rect.left) * (canvas.width / rect.width));
                pointer.canvasY = Math.floor((e.clientY - rect.top) * (canvas.height / rect.height));
                pointer.canvasHit = pointer.canvasX >= 0 && pointer.canvasX < canvas.width
                    && pointer.canvasY >= 0 && pointer.canvasY < canvas.height;
                pointer.canvasIndex = pointer.canvasHit ? (pointer.canvasY * canvas.width + pointer.canvasX) : 0;
            }
            function roundToDevicePixel(value) {
                const dpr = devicePixelRatio;
                return Math.round(value * dpr) / dpr;
            }
            function mousePan(/** @type {PointerEvent} */ e) {
                if (e.type === "pointermove" && e.buttons === 4) {
                    canvasLeft += e.movementX * 4 / dpr;
                    canvasTop += e.movementY * 4 / dpr;
                    updateCSSPosition();
                }
            }
            function mouseZoom(/** @type {WheelEvent} */ e) {
                if (!e.ctrlKey) {
                    e.preventDefault();
                    if (e.deltaY === 0) return;
                    const zoomFactor = e.deltaY < 0 ? 2 : 0.5;
                    const canvasRect = canvas.getBoundingClientRect();
                    const newScale = canvasScale * zoomFactor;
                    if (newScale < 0.02 || newScale > 2000) return; // clamp zoom level
                    const newLeft = e.clientX - (e.clientX - canvasRect.left) * zoomFactor;
                    const newTop = e.clientY - (e.clientY - canvasRect.top) * zoomFactor;
                    const newWidth = canvasRect.width * zoomFactor;
                    const newHeight = canvasRect.height * zoomFactor;
                    if (newLeft > innerWidth && canvasLeft > innerWidth
                        || (newLeft + newWidth) < 0 && (canvasLeft + canvasRect.width) < 0
                        || newTop > innerHeight && canvasTop > innerHeight
                        || (newTop + newHeight) < 0 && (canvasTop + canvasRect.height) < 0
                    ) {
                        return; // prevent zooming out beyond the edges
                    }
                    canvasScale = newScale;
                    canvasLeft = roundToDevicePixel(newLeft);
                    canvasTop = roundToDevicePixel(newTop);
                    updateCSSPosition();
                }
            }
            function load(/** @type {ImageData} */ src) {
                canvas.width = src.width;
                canvas.height = src.height;
                put(src);
                canvasScale = 1;
                centerCanvasOnWorkspace();
            }
            function centerCanvasOnWorkspace() {
                const workspaceRect = workspace.getBoundingClientRect();
                const canvasRect = canvas.getBoundingClientRect();
                const canvasCSSWidth = (canvas.width * canvasScale) / dpr;
                const canvasCSSHeight = (canvas.height * canvasScale) / dpr;
                canvasLeft = Math.round((workspaceRect.left + (workspaceRect.width - canvasCSSWidth) / 2));
                canvasTop = Math.round((workspaceRect.top + (workspaceRect.height - canvasCSSHeight) / 2));


                updateCSSPosition();
            }
            function updateCSSPosition(/** @type {number | null} */ frameTime = null) {
                if (!frameTime) {
                    frameTasks.add(updateCSSPosition);
                } else {
                    frameTasks.delete(updateCSSPosition);
                    if (dpr !== devicePixelRatio) {
                        canvasLeft = roundToDevicePixel(canvasLeft * (dpr / devicePixelRatio));
                        canvasTop = roundToDevicePixel(canvasTop * (dpr / devicePixelRatio));
                        dpr = devicePixelRatio;
                    }
                    canvas.style.width = `${canvas.width * canvasScale / dpr}px`;
                    canvas.style.height = `${canvas.height * canvasScale / dpr}px`;
                    canvas.style.left = `${canvasLeft}px`;
                    canvas.style.top = `${canvasTop}px`;
                }
            }
            function put(/** @type {ImageData|null} */ pixelData = null) {
                if (pixelData) {
                    canvasImageData = pixelData;
                }
                frameTasks.add(updatePixels);
                function updatePixels() {
                    frameTasks.delete(updatePixels);
                    context.putImageData(canvasImageData, 0, 0);
                }
            }
            workspace.addEventListener("wheel", mouseZoom, { passive: false });
            workspace.addEventListener("pointermove", (ev) => { pointerSave(ev); mousePan(ev); });
            window.addEventListener("resize", () => updateCSSPosition());
            return { load, put, pointer };
        })();
        const file = (function makeFile() {
            function loadTestPattern() {
                const testPattern = /**@type {HTMLImageElement}*/(document.getElementById("testpattern"));
                const bgContext = /**@type {CanvasRenderingContext2D}*/(document.createElement("canvas").getContext("2d"));
                bgContext.canvas.width = testPattern.naturalWidth;
                bgContext.canvas.height = testPattern.naturalHeight;
                bgContext.drawImage(testPattern, 0, 0);
                show.load(bgContext.getImageData(0, 0, bgContext.canvas.width, bgContext.canvas.height));
            }
            function init() {
                loadTestPattern();
            }
            return {
                init
            };
        })();
        // show.load(/**@type {HTMLImageElement}*/(document.getElementById("testpattern")));
        file.init();
    </script>
</body>

</html>
